<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>测试</title>
</head>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:20px;text-align:center">
<h1 id="display">0</h1>
<button onclick="addNum('1')" style="padding:20px;font-size:30px">1</button>
<button onclick="addNum('2')" style="padding:20px;font-size:30px">2</button>
<button onclick="addNum('3')" style="padding:20px;font-size:30px">3</button>
<button onclick="calc()" style="padding:20px;font-size:30px;background:orange">=</button>
<script>
let expr = '';
function addNum(n) { expr += n; document.getElementById('display').innerText = expr; }
function calc() { document.getElementById('display').innerText = eval(expr); }
</script>
</body>
</html>
