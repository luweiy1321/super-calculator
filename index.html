<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { padding: 10px 20px; background: #333; border: none; border-radius: 20px; color: white; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: #007AFF; }
        
        .calculator { max-width: 400px; margin: 0 auto; }
        
        /* 计算器样式 */
        .display { background: #2a2a2a; padding: 20px; text-align: right; font-size: 48px; border-radius: 15px 15px 0 0; overflow: hidden; text-overflow: ellipsis; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; background: #2a2a2a; border-radius: 0 0 15px 15px; }
        .btn { padding: 20px; font-size: 24px; border: none; border-radius: 10px; cursor: pointer; background: #444; color: white; }
        .btn.orange { background: #ff9500; }
        .btn.gray { background: #a5a5a5; color: black; }
        
        /* 房贷计算器 */
        .loan-calc { background: #2a2a2a; padding: 20px; border-radius: 15px; }
        .loan-calc input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-size: 16px; }
        .loan-calc button { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 10px; font-size: 18px; margin-top: 10px; }
        .result { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .result-card { background: #3a3a3a; padding: 15px; border-radius: 10px; text-align: center; }
        .result-card .label { font-size: 12px; color: #888; }
        .result-card .value { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .result-card:nth-child(1) .value { color: #007AFF; }
        .result-card:nth-child(2) .value { color: #ff9500; }
        .result-card:nth-child(3) .value { color: #34c759; }
        
        /* 单位换算 */
        .unit-calc { background: #2a2a2a; padding: 20px; border-radius: 15px; }
        .unit-calc select, .unit-calc input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-size: 16px; }
        .unit-result { margin-top: 20px; padding: 20px; background: #007AFF; border-radius: 10px; text-align: center; }
        .unit-result .value { font-size: 36px; font-weight: bold; }
        
        /* 健康计算 */
        .health-calc { background: #2a2a2a; padding: 20px; border-radius: 15px; }
        .health-calc input, .health-calc select { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-size: 16px; }
        .health-calc button { width: 100%; padding: 15px; background: #34c759; color: white; border: none; border-radius: 10px; font-size: 18px; margin-top: 10px; }
        .bmi-result { margin-top: 20px; padding: 20px; background: #3a3a3a; border-radius: 10px; text-align: center; }
        .bmi-value { font-size: 48px; font-weight: bold; }
        .bmi-category { font-size: 18px; margin-top: 10px; }
        
        /* AI 拍照 */
        .ai-photo { background: #2a2a2a; padding: 20px; border-radius: 15px; text-align: center; }
        .ai-photo .upload-area { border: 2px dashed #555; padding: 40px; border-radius: 10px; margin: 20px 0; }
        .ai-photo button { padding: 15px 30px; background: #007AFF; color: white; border: none; border-radius: 10px; font-size: 16px; }
        .ai-result { margin-top: 20px; padding: 15px; background: #3a3a3a; border-radius: 10px; text-align: left; white-space: pre-wrap; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('calc')">🧮 计算</button>
        <button class="tab-btn" onclick="showTab('ai')">📷 AI拍照</button>
        <button class="tab-btn" onclick="showTab('loan')">🏠 房贷</button>
        <button class="tab-btn" onclick="showTab('unit')">🔄 换算</button>
        <button class="tab-btn" onclick="showTab('health')">❤️ 健康</button>
    </div>
    
    <!-- 基础计算器 -->
    <div id="calc" class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn gray" onclick="clearDisplay()">AC</button>
            <button class="btn gray" onclick="deleteChar()">⌫</button>
            <button class="btn gray" onclick="addOperator('%')">%</button>
            <button class="btn orange" onclick="addOperator('/')">÷</button>
            <button class="btn" onclick="addNumber('7')">7</button>
            <button class="btn" onclick="addNumber('8')">8</button>
            <button class="btn" onclick="addNumber('9')">9</button>
            <button class="btn orange" onclick="addOperator('*')">×</button>
            <button class="btn" onclick="addNumber('4')">4</button>
            <button class="btn" onclick="addNumber('5')">5</button>
            <button class="btn" onclick="addNumber('6')">6</button>
            <button class="btn orange" onclick="addOperator('-')">-</button>
            <button class="btn" onclick="addNumber('1')">1</button>
            <button class="btn" onclick="addNumber('2')">2</button>
            <button class="btn" onclick="addNumber('3')">3</button>
            <button class="btn orange" onclick="addOperator('+')">+</button>
            <button class="btn" onclick="addNumber('0')" style="grid-column: span 2;">0</button>
            <button class="btn" onclick="addNumber('.')">.</button>
            <button class="btn orange" onclick="calculate()">=</button>
        </div>
    </div>
    
    <!-- AI 拍照解题 -->
    <div id="ai" class="ai-photo hidden">
        <div class="upload-area">
            <p>📷 点击选择照片</p>
            <p style="color: #888; font-size: 14px; margin-top: 10px;">拍照识别数学题</p>
        </div>
        <button onclick="simulateAI()">🔍 开始识别</button>
        <div class="ai-result hidden" id="aiResult">
            正在分析题目...
            
            解答步骤：
            1. 两边同时减去 5
            2x = 15 - 5
            2x = 10
            
            2. 两边同时除以 2
            x = 10 ÷ 2
            x = 5
            
            答案：x = 5
        </div>
    </div>
    
    <!-- 房贷计算器 -->
    <div id="loan" class="loan-calc hidden">
        <h2 style="margin-bottom: 20px;">🏠 房贷计算器</h2>
        <input type="number" id="loanAmount" placeholder="贷款金额（万元）">
        <input type="number" id="interestRate" placeholder="年利率（%）如：3.5">
        <select id="loanYears">
            <option value="5">5年</option>
            <option value="10">10年</option>
            <option value="15">15年</option>
            <option value="20" selected>20年</option>
            <option value="30">30年</option>
        </select>
        <button onclick="calculateLoan()">计算月供</button>
        <div class="result hidden" id="loanResult">
            <div class="result-card">
                <div class="label">月供</div>
                <div class="value" id="monthlyPayment">-</div>
            </div>
            <div class="result-card">
                <div class="label">总利息</div>
                <div class="value" id="totalInterest">-</div>
            </div>
            <div class="result-card">
                <div class="label">总还款</div>
                <div class="value" id="totalPayment">-</div>
            </div>
        </div>
    </div>
    
    <!-- 单位换算 -->
    <div id="unit" class="unit-calc hidden">
        <h2 style="margin-bottom: 20px;">🔄 单位换算</h2>
        <button id="refreshRate" onclick="fetchExchangeRates()" style="display: none; margin-bottom: 10px; padding: 8px 16px; background: #007AFF; color: white; border: none; border-radius: 8px; font-size: 14px;">🔄 刷新汇率</button>
        <p id="rateTime" style="display: none; color: #888; font-size: 12px; margin-bottom: 10px;"></p>
        <select id="unitCategory" onchange="updateUnitOptions()">
            <option value="length">长度</option>
            <option value="weight">重量</option>
            <option value="temp">温度</option>
            <option value="currency">货币</option>
        </select>
        <input type="number" id="unitInput" placeholder="输入数值" oninput="convertUnit()">
        <select id="fromUnit" onchange="convertUnit()"></select>
        <select id="toUnit" onchange="convertUnit()"></select>
        <div class="unit-result" id="unitResult">
            <div class="value">0</div>
        </div>
    </div>
    
    <!-- 健康计算 -->
    <div id="health" class="health-calc hidden">
        <h2 style="margin-bottom: 20px;">❤️ 健康计算</h2>
        <input type="number" id="height" placeholder="身高（cm）">
        <input type="number" id="weight" placeholder="体重（kg）">
        <input type="number" id="age" placeholder="年龄">
        <select id="gender">
            <option value="male">男</option>
            <option value="female">女</option>
        </select>
        <select id="activity">
            <option value="1.2">久坐</option>
            <option value="1.375">轻度运动</option>
            <option value="1.55">中度运动</option>
            <option value="1.725">重度运动</option>
        </select>
        <button onclick="calculateHealth()">计算</button>
        <div class="bmi-result hidden" id="healthResult">
            <div class="bmi-value" id="bmiValue">0</div>
            <div class="bmi-category" id="bmiCategory">正常</div>
            <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <div style="color: #888; font-size: 12px;">基础代谢</div>
                    <div style="font-size: 18px;" id="bmrValue">-</div>
                </div>
                <div>
                    <div style="color: #888; font-size: 12px;">每日消耗</div>
                    <div style="font-size: 18px;" id="tdeeValue">-</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Tab 切换
        function showTab(tabId) {
            document.querySelectorAll('.calculator, .ai-photo, .loan-calc, .unit-calc, .health-calc').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
// 计算器
        let display = '0';
        let fullExpression = '';
        let justCalculated = false;
        
        function updateDisplay() {
            document.getElementById('display').textContent = display;
        }
        
        function addNumber(num) {
            if (justCalculated) {
                fullExpression = '';
                justCalculated = false;
            }
            fullExpression += num;
            display = fullExpression;
            updateDisplay();
        }
        
        // 运算符映射 - 用于显示
        const opMap = {'*': '×', '/': '÷', '+': '+', '-': '-', '%': '%'};
        const opReverseMap = {'×': '*', '÷': '/', '+': '+', '-': '-', '%': '%'};
        
        function addOperator(op) {
            // 如果最后是运算符，替换它
            const lastChar = fullExpression.slice(-1);
            if (lastChar in opReverseMap) {
                fullExpression = fullExpression.slice(0, -1) + op;
            } else if (fullExpression !== '' || op === '-') {
                fullExpression += op;
            }
            // 显示友好符号
            let displayExpr = fullExpression;
            for (let k in opMap) {
                displayExpr = displayExpr.split(k).join(opMap[k]);
            }
            display = displayExpr || '0';
            updateDisplay();
        }
        
        function calculate() {
            if (!fullExpression) return;
            try {
                // 把显示符号转换为计算符号
                let expr = fullExpression;
                for (let k in opReverseMap) {
                    expr = expr.split(k).join(opReverseMap[k]);
                }
                let result = eval(expr);
                if (!isFinite(result) || isNaN(result)) {
                    display = 'Error';
                } else {
                    // 格式化结果
                    display = String(result);
                    if (display.length > 10) {
                        display = result.toExponential(6);
                    }
                    fullExpression = String(result);
                    justCalculated = true;
                }
            } catch (e) {
                display = 'Error';
                fullExpression = '';
            }
            updateDisplay();
        }
        
        function clearDisplay() {
            display = '0';
            fullExpression = '';
            justCalculated = false;
            updateDisplay();
        }
        
        function deleteChar() {
            if (fullExpression.length > 0) {
                fullExpression = fullExpression.slice(0, -1);
                display = fullExpression || '0';
                updateDisplay();
            }
        }
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '';
            }
            updateDisplay();
        }
        
        // 房贷计算
        function calculateLoan() {
            const amount = parseFloat(document.getElementById('loanAmount').value) * 10000;
            const rate = parseFloat(document.getElementById('interestRate').value) / 100 / 12;
            const years = parseInt(document.getElementById('loanYears').value);
            const months = years * 12;
            
            const monthly = amount * rate * Math.pow(1 + rate, months) / (Math.pow(1 + rate, months) - 1);
            const total = monthly * months;
            const interest = total - amount;
            
            document.getElementById('monthlyPayment').textContent = monthly.toFixed(2);
            document.getElementById('totalInterest').textContent = interest.toFixed(0);
            document.getElementById('totalPayment').textContent = total.toFixed(0);
            document.getElementById('loanResult').classList.remove('hidden');
        }
        
        // 单位换算
        const units = {
            length: ['米', '厘米', '毫米', '英尺', '英寸'],
            weight: ['公斤', '克', '斤', '磅', '盎司'],
            temp: ['摄氏度', '华氏度', '开尔文'],
            currency: ['人民币(CNY)', '美元(USD)', '欧元(EUR)', '日元(JPY)', '港币(HKD)', '英镑(GBP)', '韩元(KRW)']
        };
        
        // 实时汇率（以CNY为基准）
        let exchangeRates = { CNY: 1, USD: 7.2, EUR: 0.95, JPY: 150, HKD: 0.9, GBP: 0.85, KRW: 190 };
        let lastUpdateTime = '';
        
        // 获取实时汇率
        async function fetchExchangeRates() {
            const btn = document.getElementById('refreshRate');
            btn.textContent = '🔄 刷新中...';
            try {
                const response = await fetch('https://api.frankfurter.dev/v1/latest?base=CNY');
                const data = await response.json();
                if (data.rates) {
                    exchangeRates = { CNY: 1, ...data.rates };
                    lastUpdateTime = new Date().toLocaleString('zh-CN');
                    document.getElementById('rateTime').textContent = '汇率时间: ' + lastUpdateTime;
                    document.getElementById('rateTime').style.display = 'block';
                    convertUnit(); // 重新计算
                }
            } catch (e) {
                console.error('获取汇率失败:', e);
                alert('获取汇率失败，使用缓存汇率');
            }
            btn.textContent = '🔄 刷新汇率';
        }
        
        function updateUnitOptions() {
            const cat = document.getElementById('unitCategory').value;
            const opts = units[cat];
            const from = document.getElementById('fromUnit');
            const to = document.getElementById('toUnit');
            from.innerHTML = '';
            to.innerHTML = '';
            opts.forEach((u, i) => {
                from.innerHTML += `<option value="${i}">${u}</option>`;
                to.innerHTML += `<option value="${i}">${u}</option>`;
            });
            to.selectedIndex = 1;
            
            // 货币换算显示刷新按钮
            if (cat === 'currency') {
                document.getElementById('refreshRate').style.display = 'inline-block';
            } else {
                document.getElementById('refreshRate').style.display = 'none';
            }
        }
        
        function convertUnit() {
            const cat = document.getElementById('unitCategory').value;
            const val = parseFloat(document.getElementById('unitInput').value) || 0;
            const from = parseInt(document.getElementById('fromUnit').value);
            const to = parseInt(document.getElementById('toUnit').value);
            
            let result = val;
            if (cat === 'length') {
                const toMeter = [1, 0.01, 0.001, 0.3048, 0.0254];
                result = val * toMeter[from] / toMeter[to];
            } else if (cat === 'weight') {
                const toKg = [1, 0.001, 0.5, 0.453592, 0.0283495];
                result = val * toKg[from] / toKg[to];
            } else if (cat === 'temp') {
                if (from === 0 && to === 1) result = val * 9/5 + 32;
                else if (from === 1 && to === 0) result = (val - 32) * 5/9;
                else if (from === 0 && to === 2) result = val + 273.15;
                else if (from === 2 && to === 0) result = val - 273.15;
                else if (from === 1 && to === 2) result = (val - 32) * 5/9 + 273.15;
                else if (from === 2 && to === 1) result = (val - 273.15) * 9/5 + 32;
            } else if (cat === 'currency') {
                const currencyKeys = ['CNY', 'USD', 'EUR', 'JPY', 'HKD', 'GBP', 'KRW'];
                const fromRate = exchangeRates[currencyKeys[from]];
                const toRate = exchangeRates[currencyKeys[to]];
                result = (val / fromRate) * toRate;
            }
            
            document.querySelector('.unit-result .value').textContent = result.toFixed(4);
        }
        
        updateUnitOptions();
        
        // 健康计算
        function calculateHealth() {
            const h = parseFloat(document.getElementById('height').value);
            const w = parseFloat(document.getElementById('weight').value);
            const a = parseFloat(document.getElementById('age').value);
            const g = document.getElementById('gender').value;
            const act = parseFloat(document.getElementById('activity').value);
            
            if (!h || !w || !a) return;
            
            const bmi = w / ((h/100) ** 2);
            let bmiCat = '正常';
            let bmiColor = '#34c759';
            if (bmi < 18.5) { bmiCat = '偏瘦'; bmiColor = '#007AFF'; }
            else if (bmi < 24) { bmiCat = '正常'; bmiColor = '#34c759'; }
            else if (bmi < 28) { bmiCat = '偏胖'; bmiColor = '#ff9500'; }
            else { bmiCat = '肥胖'; bmiColor = '#ff3b30'; }
            
            let bmr = g === 'male' ? 10*w + 6.25*h - 5*a + 5 : 10*w + 6.25*h - 5*a - 161;
            const tdee = bmr * act;
            
            document.getElementById('bmiValue').textContent = bmi.toFixed(1);
            document.getElementById('bmiValue').style.color = bmiColor;
            document.getElementById('bmiCategory').textContent = bmiCat;
            document.getElementById('bmrValue').textContent = bmr.toFixed(0) + ' 千卡';
            document.getElementById('tdeeValue').textContent = tdee.toFixed(0) + ' 千卡';
            document.getElementById('healthResult').classList.remove('hidden');
        }
        
        // AI 模拟
        function simulateAI() {
            document.getElementById('aiResult').classList.remove('hidden');
        }
    </script>
</body>
</html>
