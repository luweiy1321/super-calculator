<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超级计算器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            width: 100%;
            max-width: 340px;
        }
        .display {
            text-align: right;
            padding: 20px 15px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .expression {
            font-size: 16px;
            color: #888;
            height: 20px;
            overflow: hidden;
        }
        .result {
            font-size: 48px;
            font-weight: 300;
            color: #fff;
            letter-spacing: -2px;
            word-break: break-all;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 5px;
        }
        .btn {
            height: 52px;
            border-radius: 26px;
            border: none;
            font-size: 22px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-orange { background: #ff9f0a; color: #fff; }
        .btn-gray { background: #a5a5a5; color: #000; }
        .btn-dark { background: #505050; color: #fff; }
        .btn-wide { grid-column: span 2; }
        .row { display: contents; }
        .theme-bar {
            display: flex;
            gap: 5px;
            padding: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .theme-btn {
            padding: 5px 10px;
            border-radius: 15px;
            border: none;
            font-size: 11px;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s;
        }
        .theme-btn.active { opacity: 1; border: 2px solid #fff; }
        .divider {
            grid-column: span 4;
            height: 1px;
            background: rgba(255,159,10,0.2);
            margin: 5px 0;
        }
        @media (max-width: 350px) {
            .btn { height: 48px; font-size: 20px; }
            .result { font-size: 42px; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="theme-bar" id="themeBar"></div>
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="display">0</div>
        </div>
        <div class="buttons" id="buttons"></div>
    </div>

    <script>
        const themes = {
            '深空黑': { bg: '#000', btn_bg: '#333', orange: '#ff9f0a', func: '#a5a5a5', sci: '#505050', text: '#fff' },
            '海洋蓝': { bg: '#001f3f', btn_bg: '#003366', orange: '#0074d9', func: '#004080', sci: '#004080', text: '#fff' },
            '极光紫': { bg: '#1a0a2e', btn_bg: '#2d1b4e', orange: '#9b59b6', func: '#3d2066', sci: '#3d2066', text: '#fff' },
            '荧光绿': { bg: '#0a1a0a', btn_bg: '#1a3a1a', orange: '#2ecc40', func: '#1e4d2b', sci: '#1e4d2b', text: '#fff' },
            '烈焰红': { bg: '#1a0a0a', btn_bg: '#3a1a1a', orange: '#e74c3c', func: '#4a2020', sci: '#4a2020', text: '#fff' },
            '香槟金': { bg: '#1a150a', btn_bg: '#3a3020', orange: '#f39c12', func: '#4a4025', sci: '#4a4025', text: '#fff' },
        };

        let currentTheme = '深空黑';
        let display = '0';
        let expression = '';
        let prevVal = null;
        let operator = null;
        let newNum = true;
        let isDeg = true;
        let is2nd = false;

        function getTheme() { return themes[currentTheme]; }

        function fmt(n) {
            if (isNaN(n)) return 'Error';
            if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
            if (Math.abs(n) > 1e12) return n.toExponential(4);
            if (n === Math.floor(n)) return String(Math.floor(n));
            return parseFloat(n.toPrecision(10)).toString();
        }

        function toRad(d) { return isDeg ? d * Math.PI / 180 : d; }
        function toDeg(r) { return isDeg ? r * 180 / Math.PI : r; }

        function doCalc(a, b, op) {
            a = parseFloat(a); b = parseFloat(b);
            if (op === '+') return a + b;
            if (op === '-') return a - b;
            if (op === '×') return a * b;
            if (op === '÷') return b !== 0 ? a / b : 0;
            if (op === '^') return Math.pow(a, b);
            return b;
        }

        function update() {
            document.getElementById('display').textContent = display;
            document.getElementById('expression').textContent = expression;
            document.body.style.background = getTheme().bg;
        }

        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            if (n > 170) return Infinity;
            let r = 1;
            for (let i = 2; i <= n; i++) r *= i;
            return r;
        }

        function handleBtn(key) {
            const curr = parseFloat(display);

            if (key === '2nd') {
                is2nd = !is2nd;
                renderButtons();
            } else if (key === 'deg') {
                isDeg = !isDeg;
                renderButtons();
            } else if (key === 'sin') {
                const r = is2nd ? toDeg(Math.asin(curr)) : Math.sin(toRad(curr));
                expression = is2nd ? `sin⁻¹(${curr})` : `sin(${curr})`;
                display = fmt(r);
                is2nd = false;
            } else if (key === 'cos') {
                const r = is2nd ? toDeg(Math.acos(curr)) : Math.cos(toRad(curr));
                expression = is2nd ? `cos⁻¹(${curr})` : `cos(${curr})`;
                display = fmt(r);
                is2nd = false;
            } else if (key === 'tan') {
                const r = is2nd ? toDeg(Math.atan(curr)) : Math.tan(toRad(curr));
                expression = is2nd ? `tan⁻¹(${curr})` : `tan(${curr})`;
                display = fmt(r);
                is2nd = false;
            } else if (key === 'x2') {
                expression = `${curr}²`;
                display = fmt(curr * curr);
            } else if (key === 'sqrt') {
                const r = is2nd ? Math.pow(curr, 0.25) : Math.sqrt(curr);
                expression = is2nd ? `∜(${curr})` : `√(${curr})`;
                display = fmt(r);
            } else if (key === 'pow') {
                if (operator && !newNum) {
                    const result = doCalc(prevVal, display, operator);
                    display = fmt(result);
                    prevVal = result;
                } else {
                    prevVal = curr;
                }
                operator = '^';
                expression = `${prevVal} ^`;
                newNum = true;
            } else if (key === 'pi') {
                expression = 'π';
                display = fmt(Math.PI);
            } else if (key === 'e') {
                expression = 'e';
                display = fmt(Math.E);
            } else if (key === 'fact') {
                expression = `${curr}!`;
                display = fmt(factorial(Math.floor(curr)));
            } else if (key === 'ln') {
                const r = is2nd ? Math.exp(curr) : Math.log(curr);
                expression = is2nd ? `e^${curr}` : `ln(${curr})`;
                display = fmt(r);
                is2nd = false;
            } else if (key === 'log') {
                const r = is2nd ? Math.pow(10, curr) : Math.log10(curr);
                expression = is2nd ? `10^${curr}` : `log(${curr})`;
                display = fmt(r);
                is2nd = false;
            } else if (key === 'exp') {
                prevVal = curr;
                operator = 'EXP';
                expression = `${curr} × 10^`;
                newNum = true;
            } else if (key === 'ac') {
                display = '0';
                expression = '';
                prevVal = null;
                operator = null;
                newNum = true;
            } else if (key === 'neg') {
                display = fmt(curr * -1);
            } else if (key === '%') {
                expression = `${curr}%`;
                display = fmt(curr / 100);
            } else if (key >= '0' && key <= '9' || key === '.') {
                if (newNum || display === '0') {
                    display = key === '.' ? '0.' : key;
                    newNum = false;
                } else if (key === '.' && display.includes('.')) {
                    return;
                } else if (display.length < 12) {
                    display += key;
                }
            } else if (key === '+' || key === '-' || key === '×' || key === '÷') {
                if (operator && !newNum) {
                    const result = doCalc(prevVal, display, operator);
                    display = fmt(result);
                    prevVal = result;
                } else {
                    prevVal = curr;
                }
                operator = key;
                expression = `${prevVal} ${key}`;
                newNum = true;
            } else if (key === '=' || key === 'eq') {
                if (operator && prevVal !== null) {
                    let result;
                    if (operator === 'EXP') {
                        result = prevVal * Math.pow(10, curr);
                        expression = `${prevVal} × 10^${curr}`;
                    } else {
                        result = doCalc(prevVal, curr, operator);
                        expression = `${prevVal} ${operator} ${curr} =`;
                    }
                    display = fmt(result);
                    prevVal = result;
                    operator = null;
                    newNum = true;
                }
            }
            update();
        }

        function createBtn(label, key, cls) {
            const btn = document.createElement('button');
            btn.className = `btn ${cls}`;
            btn.textContent = label;
            btn.onclick = () => handleBtn(key);
            return btn;
        }

        function renderButtons() {
            const t = getTheme();
            const btns = document.getElementById('buttons');
            btns.innerHTML = '';

            // 科学函数
            const sciRow1 = ['2nd', isDeg ? 'DEG' : 'RAD', 'sin', 'cos'].map((label, i) => {
                const keys = ['2nd', 'deg', 'sin', 'cos'];
                return createBtn(label, keys[i], 'btn-dark');
            });
            const sciRow2 = ['tan', 'x²', '√', 'xʸ'].map((label, i) => {
                const keys = ['tan', 'x2', 'sqrt', 'pow'];
                return createBtn(label, keys[i], 'btn-dark');
            });
            const sciRow3 = ['π', 'e', 'n!', 'ln'].map((label, i) => {
                const keys = ['pi', 'e', 'fact', 'ln'];
                return createBtn(label, keys[i], 'btn-dark');
            });
            const sciRow4 = ['log', 'EXP', '%', '÷'].map((label, i) => {
                const keys = ['log', 'exp', '%', '÷'];
                return createBtn(label, keys[i], 'btn-dark');
            });

            // 分割线
            const divider = document.createElement('div');
            divider.className = 'divider';
            btns.appendChild(divider);

            // 基础运算
            const basicRow1 = [
                createBtn('AC', 'ac', 'btn-gray'),
                createBtn('±', 'neg', 'btn-gray'),
                createBtn('', '', 'btn'),
                createBtn('×', '×', 'btn-orange')
            ];

            const basicRow2 = [
                createBtn('7', '7', 'btn'),
                createBtn('8', '8', 'btn'),
                createBtn('9', '9', 'btn'),
                createBtn('÷', '÷', 'btn-orange')
            ];

            const basicRow3 = [
                createBtn('4', '4', 'btn'),
                createBtn('5', '5', 'btn'),
                createBtn('6', '6', 'btn'),
                createBtn('-', '-', 'btn-orange')
            ];

            const basicRow4 = [
                createBtn('1', '1', 'btn'),
                createBtn('2', '2', 'btn'),
                createBtn('3', '3', 'btn'),
                createBtn('+', '+', 'btn-orange')
            ];

            const basicRow5 = [
                createBtn('0', '0', 'btn btn-wide'),
                createBtn('.', '.', 'btn'),
                createBtn('=', 'eq', 'btn-orange')
            ];

            [sciRow1, sciRow2, sciRow3, sciRow4, basicRow1, basicRow2, basicRow3, basicRow4, basicRow5].forEach(row => {
                row.forEach(btn => btns.appendChild(btn));
            });
        }

        function renderThemes() {
            const bar = document.getElementById('themeBar');
            bar.innerHTML = '';
            Object.keys(themes).forEach(name => {
                const btn = document.createElement('button');
                btn.className = `theme-btn ${name === currentTheme ? 'active' : ''}`;
                btn.textContent = name;
                btn.style.background = themes[name].orange;
                btn.style.color = '#fff';
                btn.onclick = () => {
                    currentTheme = name;
                    renderThemes();
                    renderButtons();
                    update();
                };
                bar.appendChild(btn);
            });
        }

        renderThemes();
        renderButtons();
        update();
    </script>
</body>
</html>
