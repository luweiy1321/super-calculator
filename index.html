<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>超级计算器</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px}
.tab{display:flex;gap:10px;margin-bottom:15px;overflow-x:auto}
.tab button{padding:10px 15px;background:#333;border:none;border-radius:20px;color:#fff;white-space:nowrap}
.tab button.active{background:#007AFF}
.calc{max-width:350px;margin:0 auto}
.display{background:#2a2a2a;padding:20px;font-size:42px;text-align:right;border-radius:15px 15px 0 0}
.buttons{background:#2a2a2a;padding:10px;border-radius:0 0 15px 15px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.btn{padding:18px;font-size:22px;border:none;border-radius:10px;background:#444;color:#fff}
.btn.orange{background:#ff9500}
.btn.gray{background:#a5a5a5;color:#000}
.hidden{display:none}
</style>
</head>
<body>
<div class="tab">
<button class="active" onclick="showTab('calc')">🧮 计算</button>
<button onclick="showTab('loan')">🏠 房贷</button>
<button onclick="showTab('unit')">🔄 换算</button>
<button onclick="showTab('health')">❤️ 健康</button>
</div>

<div id="calc" class="calc">
<div class="display" id="d">0</div>
<div class="buttons">
<button class="btn gray" onclick="ac()">AC</button>
<button class="btn gray" onclick="del()">⌫</button>
<button class="btn gray" onclick="op('%')">%</button>
<button class="btn orange" onclick="op('/')">÷</button>
<button class="btn" onclick="num('7')">7</button>
<button class="btn" onclick="num('8')">8</button>
<button class="btn" onclick="num('9')">9</button>
<button class="btn orange" onclick="op('*')">×</button>
<button class="btn" onclick="num('4')">4</button>
<button class="btn" onclick="num('5')">5</button>
<button class="btn" onclick="num('6')">6</button>
<button class="btn orange" onclick="op('-')">-</button>
<button class="btn" onclick="num('1')">1</button>
<button class="btn" onclick="num('2')">2</button>
<button class="btn" onclick="num('3')">3</button>
<button class="btn orange" onclick="op('+')">+</button>
<button class="btn" onclick="num('0')" style="grid-column:span 2">0</button>
<button class="btn" onclick="num('.')">.</button>
<button class="btn orange" onclick="eq()">=</button>
</div>
</div>

<div id="loan" class="calc hidden">
<div class="display" style="font-size:20px">🏠 房贷计算</div>
<div style="background:#2a2a2a;padding:15px;border-radius:0 0 15px 15px">
<input id="la" type="number" value="100" placeholder="贷款(万)" style="width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px">
<input id="lr" type="number" value="3.5" step="0.1" placeholder="利率(%)" style="width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px">
<select id="ly" style="width:100%;padding:12px;margin:8px 0;border-radius:8px">
<option>5</option><option>10</option><option>15</option><option>20</option><option selected>25</option><option>30</option>
</select>
<button onclick="calcLoan()" style="width:100%;padding:15px;background:#007AFF;color:#fff;border:none;border-radius:10px;font-size:18px;margin-top:10px">计算</button>
<div id="lrDiv" class="hidden" style="margin-top:15px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
<div style="background:#3a3a3a;padding:12px;border-radius:10px;text-align:center"><div style="font-size:12px;color:#888">月供</div><div id="lm" style="font-size:16px;color:#007AFF"></div></div>
<div style="background:#3a3a3a;padding:12px;border-radius:10px;text-align:center"><div style="font-size:12px;color:#888">利息</div><div id="li" style="font-size:16px;color:#ff9500"></div></div>
<div style="background:#3a3a3a;padding:12px;border-radius:10px;text-align:center"><div style="font-size:12px;color:#888">总额</div><div id="lt" style="font-size:16px;color:#34c759"></div></div>
</div>
</div>
</div>

<div id="unit" class="calc hidden">
<div class="display" style="font-size:20px">🔄 单位换算</div>
<div style="background:#2a2a2a;padding:15px;border-radius:0 0 15px 15px">
<select id="ut" onchange="updU()" style="width:100%;padding:12px;margin:8px 0;border-radius:8px">
<option value="c">💱 货币</option>
<option value="l">📏 长度</option>
<option value="w">⚖️ 重量</option>
<option value="t">🌡️ 温度</option>
</select>
<div style="display:flex;gap:5px">
<input id="uv" type="number" value="1" style="flex:1;padding:12px;border-radius:8px;border:none">
<select id="uf" style="flex:1;padding:12px;border-radius:8px;border:none"></select>
<select id="ut2" style="flex:1;padding:12px;border-radius:8px;border:none"></select>
</div>
<button onclick="convU()" style="width:100%;padding:15px;background:#007AFF;color:#fff;border:none;border-radius:10px;font-size:18px;margin-top:10px">换算</button>
<div id="ur" style="margin-top:15px;padding:20px;background:#007AFF;border-radius:10px;text-align:center;font-size:24px"></div>
</div>
</div>

<div id="health" class="calc hidden">
<div class="display" style="font-size:20px">❤️ 健康计算</div>
<div style="background:#2a2a2a;padding:15px;border-radius:0 0 15px 15px">
<div style="display:flex;gap:10px">
<input id="hh" type="number" value="170" placeholder="身高(cm)" style="flex:1;padding:12px;border-radius:8px;border:none">
<input id="hw" type="number" value="65" placeholder="体重(kg)" style="flex:1;padding:12px;border-radius:8px;border:none">
</div>
<div style="display:flex;gap:10px;margin-top:8px">
<input id="ha" type="number" value="30" placeholder="年龄" style="flex:1;padding:12px;border-radius:8px;border:none">
<select id="hg" style="flex:1;padding:12px;border-radius:8px;border:none"><option>男</option><option>女</option></select>
</div>
<select id="hac" style="width:100%;padding:12px;margin:8px 0;border-radius:8px">
<option value="1.2">久坐</option><option value="1.375">轻度</option><option value="1.55">中度</option><option value="1.725">重度</option>
</select>
<button onclick="calcH()" style="width:100%;padding:15px;background:#34c759;color:#fff;border:none;border-radius:10px;font-size:18px;margin-top:10px">计算</button>
<div id="hrDiv" class="hidden" style="margin-top:15px;padding:20px;background:#3a3a3a;border-radius:10px;text-align:center">
<div id="bmi" style="font-size:48px;font-weight:bold;color:#34c759"></div>
<div id="cat" style="font-size:18px;color:#34c759"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px">
<div style="background:#444;padding:12px;border-radius:10px"><div style="font-size:12px;color:#888">基础代谢</div><div id="bmr"></div></div>
<div style="background:#444;padding:12px;border-radius:10px"><div style="font-size:12px;color:#888">每日消耗</div><div id="tdee"></div></div>
</div>
</div>
</div>
</div>

<script>
var ex = '';
var jc = false;

function showTab(id) {
  document.getElementById('calc').classList.add('hidden');
  document.getElementById('loan').classList.add('hidden');
  document.getElementById('unit').classList.add('hidden');
  document.getElementById('health').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
  var tabs = document.querySelectorAll('.tab button');
  tabs.forEach(function(t){t.classList.remove('active')});
  tabs[id=='calc'?0:id=='loan'?1:id=='unit'?2:3].classList.add('active');
}

function num(n) {
  if (jc) { ex = ''; jc = false; }
  ex += n;
  document.getElementById('d').innerText = ex;
}

function op(o) {
  if (ex && '+-*/%'.indexOf(ex.slice(-1)) > -1) {
    ex = ex.slice(0,-1) + o;
  } else if (ex) {
    ex += o;
  }
  document.getElementById('d').innerText = ex.split('*').join('×').split('/').join('÷');
}

function ac() { ex = ''; document.getElementById('d').innerText = '0'; }
function del() { ex = ex.slice(0,-1); document.getElementById('d').innerText = ex || '0'; }

function eq() {
  try {
    var r = eval(ex);
    ex = String(r);
    document.getElementById('d').innerText = ex;
    jc = true;
  } catch(e) { document.getElementById('d').innerText = 'Error'; ex = ''; }
}

function calcLoan() {
  var A = parseFloat(document.getElementById('la').value) * 10000;
  var R = parseFloat(document.getElementById('lr').value) / 100 / 12;
  var Y = parseInt(document.getElementById('ly').value);
  var N = Y * 12;
  var m = A * R * Math.pow(1+R,N) / (Math.pow(1+R,N) - 1);
  document.getElementById('lm').innerText = m.toFixed(2);
  document.getElementById('li').innerText = Math.round(m*N-A).toLocaleString();
  document.getElementById('lt').innerText = Math.round(m*N).toLocaleString();
  document.getElementById('lrDiv').classList.remove('hidden');
  document.getElementById('lrDiv').style.display = 'grid';
}

var u = {c:['人民币','美元','欧元','日元','港币','英镑','韩元'],l:['米','厘米','毫米','英尺','英寸'],w:['公斤','克','斤','磅','盎司'],t:['摄氏度','华氏度','开尔文']};
var rate = {CNY:1,USD:7.2,EUR:0.95,JPY:150,HKD:0.9,GBP:0.85,KRW:190};

function updU() {
  var t = document.getElementById('ut').value;
  var s = u[t];
  var f = document.getElementById('uf');
  var t2 = document.getElementById('ut2');
  f.innerHTML = ''; t2.innerHTML = '';
  s.forEach(function(x,i){f.innerHTML += '<option value="'+i+'">'+x+'</option>';});
  s.forEach(function(x,i){t2.innerHTML += '<option value="'+i+'">'+x+'</option>';});
  if (t == 'c') t2.selectedIndex = 1;
}
updU();

function convU() {
  var t = document.getElementById('ut').value;
  var v = parseFloat(document.getElementById('uv').value);
  var f = parseInt(document.getElementById('uf').value);
  var tt = parseInt(document.getElementById('ut2').value);
  var r;
  if (t == 'c') {
    var c = ['CNY','USD','EUR','JPY','HKD','GBP','KRW'];
    r = (v / rate[c[f]]) * rate[c[tt]];
    document.getElementById('ur').innerText = r.toFixed(4);
  } else if (t == 'l') {
    var l = [1,0.01,0.001,0.3048,0.0254];
    r = v * l[f] / l[tt];
    document.getElementById('ur').innerText = r.toFixed(6);
  } else if (t == 'w') {
    var w = [1,0.001,0.5,0.453592,0.0283495];
    r = v * w[f] / w[tt];
    document.getElementById('ur').innerText = r.toFixed(6);
  } else {
    var c = f==0?v:(f==1?(v-32)*5/9:v-273.15);
    r = tt==0?c:(tt==1?c*9/5+32:c+273.15);
    document.getElementById('ur').innerText = r.toFixed(2) + '°';
  }
}

function calcH() {
  var h = parseFloat(document.getElementById('hh').value);
  var w = parseFloat(document.getElementById('hw').value);
  var ag = parseFloat(document.getElementById('ha').value);
  var g = document.getElementById('hg').value;
  var ac = parseFloat(document.getElementById('hac').value);
  var bmi = w / Math.pow(h/100, 2);
  var cat = bmi < 18.5 ? '偏瘦' : bmi < 24 ? '正常' : bmi < 28 ? '偏胖' : '肥胖';
  var color = bmi < 18.5 ? '#007AFF' : bmi < 24 ? '#34c759' : bmi < 28 ? '#ff9500' : '#ff3b30';
  var bmr = g == '男' ? 10*w + 6.25*h - 5*ag + 5 : 10*w + 6.25*h - 5*ag - 161;
  var td = bmr * ac;
  document.getElementById('bmi').innerText = bmi.toFixed(1);
  document.getElementById('bmi').style.color = color;
  document.getElementById('cat').innerText = cat;
  document.getElementById('cat').style.color = color;
  document.getElementById('bmr').innerText = Math.round(bmr);
  document.getElementById('tdee').innerText = Math.round(td);
  document.getElementById('hrDiv').classList.remove('hidden');
}
</script>
</body>
</html>
